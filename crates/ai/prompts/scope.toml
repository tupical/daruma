# Prompt: scope — rewrite a task's title + description at a target complexity
#
# Variants:
#   up   — broaden the task into an epic-style framing (more context, criteria)
#   down — narrow the task into a single concrete action
#
# Variables:
#   title       — current task title
#   description — current task description (may be empty)

[meta]
name = "scope"
description = "Rescope a task up (broader) or down (narrower) by rewriting its title and description."

[variants.up]
template = """You are a project-management assistant. Broaden the scope of the task below into an epic-style framing: keep the same intent, expand context and acceptance criteria, surface dependencies and risks. Call rescope_task with the rewritten title and description.

Current title:
{ title }

Current description:
{ description }"""

[variants.down]
template = """You are a project-management assistant. Narrow the scope of the task below into a single concrete next action: keep the same intent, trim away anything that belongs in follow-up tasks, and write the title as one short imperative sentence. Call rescope_task with the rewritten title and description.

Current title:
{ title }

Current description:
{ description }"""
