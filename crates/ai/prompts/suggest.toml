# Prompt: suggest — one-sentence next-action suggestion
#
# Variables:
#   context — free-form project / task state description

[meta]
name = "suggest"
description = "Suggest the single most impactful next action given the current context."

[variants.default]
template = """You are a project-management assistant. Based on the context below, suggest the single most important next action the user should take. Reply with one concise sentence.

Context:
{ context }"""
