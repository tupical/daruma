# Publish install.sh for curl | bash (GitHub Pages).
# Site URL: https://tupical.github.io/taskagent/install.sh
name: Pages — install.sh

on:
  push:
    branches: [main]
    paths:
      - install.sh
      - .github/workflows/pages-install.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-install
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Pages artifact
        run: |
          mkdir -p _site
          cp install.sh _site/install.sh
          chmod +x _site/install.sh
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '<head><meta charset="utf-8"><title>TaskAgent install</title></head>' \
            '<body>' \
            '<h1>TaskAgent</h1>' \
            '<p>Install:</p>' \
            '<pre><code>curl -fsSL https://tupical.github.io/taskagent/install.sh | bash</code></pre>' \
            '</body></html>' \
            > _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
